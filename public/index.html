  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #050505;
      --bg-secondary: rgba(20, 20, 20, 0.6);
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.06);
      --bg-elevated: #1a1a1a;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      --border-active: rgba(235, 203, 139, 0.25);
      --text-primary: #F2F2F2;
      --text-secondary: #9CA3AF;
      --text-muted: #525252;
      --accent-warm: #EBCB8B;
      --accent-gold: #EBCB8B;
      --accent-glow: rgba(235, 203, 139, 0.3);
      --accent-green: #A3BE8C;
      --accent-red: #BF616A;
      --accent-blue: #88C0D0;
      --font-display: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    /* Light mode overrides */
    body.light {
      --bg-primary: #fafafa;
      --bg-secondary: rgba(245, 245, 245, 0.85);
      --bg-card: rgba(0, 0, 0, 0.02);
      --bg-card-hover: rgba(0, 0, 0, 0.04);
      --bg-elevated: #e8e8e8;
      --border: rgba(0, 0, 0, 0.08);
      --border-hover: rgba(0, 0, 0, 0.14);
      --border-active: rgba(160, 120, 40, 0.25);
      --text-primary: #111111;
      --text-secondary: #4B5563;
      --text-muted: #9CA3AF;
      --accent-warm: #b8860b;
      --accent-gold: #b8860b;
      --accent-glow: rgba(184, 134, 11, 0.15);
      --accent-green: #2d7a2d;
      --accent-red: #c0392b;
      --accent-blue: #2e86ab;
    }
    body.light { background-image: radial-gradient(circle at 50% 0%, #f0f0f0 0%, transparent 70%); }
    body.light ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); }
    body.light ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.18); }
    body.light .code-block { background: rgba(0,0,0,0.03); backdrop-filter: blur(10px); }
    body.light .sim-terminal { background: #ffffff; }
    body.light .sim-header { background: rgba(0,0,0,0.02); }
    body.light .digest-header { background: rgba(0,0,0,0.02); }
    body.light .scenario-msg { background: rgba(0,0,0,0.03); }
    body.light .faq-steps { background: rgba(0,0,0,0.03); }
    body.light .sim-status.idle { background: rgba(0,0,0,0.05); }
    body.light .sim-status.running { background: rgba(184,134,11,0.08); }
    body.light .sim-status.complete { background: rgba(45,122,45,0.08); }
    body.light .doc h1 { background: linear-gradient(180deg, #111 0%, #666 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    body.light .doc h1 em { background: linear-gradient(90deg, var(--accent-warm), #333); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    body.light .main::before { background: radial-gradient(50% 50% at 50% 50%, rgba(0,0,0,0.03) 0%, transparent 100%); }
    body.light .sidebar { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    body.light .feature-card .card-icon { box-shadow: 0 0 12px rgba(184,134,11,0.1); }
    body.light .play-btn { color: var(--text-primary); }
    body.light .logo-img { filter: invert(1); }
    body.light .mobile-hamburger { background: rgba(240,240,240,0.85); border-color: rgba(0,0,0,0.1); color: var(--text-primary); }
    body.light .mobile-overlay { background: rgba(255,255,255,0.5); }

    body {
      background-color: var(--bg-primary);
      background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, transparent 70%), url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      color: var(--text-primary);
      font-family: var(--font-body); display: flex;
      min-height: 100vh; overflow: hidden;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.015em;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

    /* ═══ SIDEBAR ═══ */
    .sidebar {
      width: 260px; background: var(--bg-secondary);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255,255,255,0.03);
      display: flex; flex-direction: column; flex-shrink: 0;
      height: 100vh; z-index: 10;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }
    .sidebar-logo {
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: opacity 0.2s;
    }
    .sidebar-logo:hover { opacity: 0.8; }
    .logo-img {
      width: 32px; height: 32px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
    }
    .logo-text { display: flex; flex-direction: column; }
    .logo-text strong {
      font-family: var(--font-display); font-size: 17px; font-weight: 600;
      letter-spacing: -0.01em; color: var(--text-primary);
    }
    .logo-text small {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--text-muted);
      font-weight: 500; margin-top: 2px;
    }
    .sidebar-nav { flex: 1; overflow-y: hidden; padding: 12px 12px 8px; }
    .nav-section { margin-bottom: 16px; }
    .nav-section-title {
      font-size: 9px; text-transform: uppercase;
      letter-spacing: 0.18em; color: var(--text-muted);
      font-weight: 600; padding: 0 14px; margin-bottom: 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      width: 100%; text-align: left; padding: 7px 14px;
      border: none; background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      border-radius: 6px; cursor: pointer;
      transition: all 0.2s ease; margin-bottom: 1px; position: relative;
    }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text-primary); }
    .nav-item.active {
      background: linear-gradient(90deg, rgba(255,255,255,0.08) 0%, transparent 100%);
      color: #fff; font-weight: 500;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      border-left: 2px solid var(--accent-warm);
    }
    .nav-item.active::before { display: none; }
    .nav-item i { width: 16px; text-align: center; font-size: 11px; opacity: 0.6; }
    .nav-item.active i { opacity: 1; }
    .sidebar-footer { padding: 10px 12px; border-top: 1px solid var(--border); }
    .sidebar-badge {
      display: flex; align-items: center; gap: 10px; padding: 8px 12px;
      background: rgba(255,255,255,0.03); border-radius: 10px; border: 1px solid var(--border);
    }
    .pulse-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 8px rgba(163,190,140,0.5);
      animation: pulse-glow 2s infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(163,190,140,0.5); }
      50% { opacity: 0.6; box-shadow: 0 0 4px rgba(163,190,140,0.3); }
    }
    .sidebar-badge span { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); font-weight: 500; }

    /* ═══ MAIN ═══ */
    .main { flex: 1; height: 100vh; overflow-y: auto; position: relative; }
    .main::before {
      content: ''; position: fixed; top: -200px; left: 50%;
      transform: translateX(-50%); width: 800px; height: 400px;
      background: radial-gradient(50% 50% at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 100%);
      pointer-events: none; z-index: 0;
    }
    .content-area {
      max-width: 780px; margin: 0 auto; padding: 56px 48px 120px;
      opacity: 1; transform: translateY(0);
      transition: opacity 0.25s ease;
      position: relative; z-index: 1;
      animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .content-area.fade-out { opacity: 0; }
    @keyframes slideUpFade {
      0% { opacity: 0; transform: translateY(20px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ═══ TYPOGRAPHY ═══ */
    .doc h1 {
      font-family: var(--font-display); font-size: 3.5rem; font-weight: 700;
      letter-spacing: -0.04em; line-height: 1.1;
      background: linear-gradient(180deg, #fff 0%, #a0a0a0 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 24px;
    }
    .doc h1 em {
      font-style: normal;
      background: linear-gradient(90deg, var(--accent-warm), #fff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .doc .subtitle {
      font-size: 1.15rem; line-height: 1.65; color: var(--text-secondary);
      margin-bottom: 40px; max-width: 620px; font-weight: 300;
    }
    .doc h2 {
      font-family: var(--font-display); font-size: 1.5rem; font-weight: 600;
      letter-spacing: -0.02em; color: var(--text-primary);
      margin-top: 64px; margin-bottom: 16px; padding-bottom: 0;
      border-bottom: none;
    }
    .doc h2:first-of-type { margin-top: 40px; }
    .doc h3 {
      font-size: 1rem; font-weight: 600; color: var(--text-primary);
      margin-top: 32px; margin-bottom: 10px; letter-spacing: -0.01em;
    }
    .doc p {
      font-size: 1.05rem; line-height: 1.7; color: var(--text-secondary);
      margin-bottom: 16px; font-weight: 300; max-width: 680px;
    }
    .doc p strong { color: var(--text-primary); font-weight: 500; }
    .doc a { color: var(--accent-warm); text-decoration: underline; text-decoration-color: rgba(235,203,139,0.3); text-underline-offset: 3px; }
    .doc a:hover { text-decoration-color: var(--accent-warm); }
    .doc ul { list-style: none; padding: 0; margin-bottom: 20px; }
    .doc li {
      position: relative; padding-left: 20px; margin-bottom: 10px;
      color: var(--text-secondary); font-size: 0.95rem; line-height: 1.65; font-weight: 300;
    }
    .doc li::before {
      content: ''; position: absolute; left: 2px; top: 10px;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent-warm); opacity: 0.6;
    }
    .doc li strong { color: var(--text-primary); font-weight: 500; }

    /* ═══ COMPONENTS ═══ */
    .doc-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 5px 14px; border-radius: 100px;
      background: rgba(235,203,139,0.06); border: 1px solid rgba(235,203,139,0.12);
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.14em; color: var(--accent-warm); margin-bottom: 24px;
    }
    .doc-badge i { font-size: 8px; }
    .callout {
      padding: 20px 24px; border-radius: 16px; margin: 24px 0;
      border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden;
      box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.05);
    }
    .callout::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
    .callout-info { background: rgba(136,192,208,0.04); border-color: rgba(136,192,208,0.1); }
    .callout-info::before { background: var(--accent-blue); }
    .callout-warm { background: rgba(235,203,139,0.04); border-color: rgba(235,203,139,0.1); }
    .callout-warm::before { background: var(--accent-warm); }
    .callout-green { background: rgba(163,190,140,0.04); border-color: rgba(163,190,140,0.1); }
    .callout-green::before { background: var(--accent-green); }
    .callout h4 { font-size: 0.85rem; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .callout p { font-size: 0.85rem; color: var(--text-secondary); margin: 0; line-height: 1.6; }
    .callout a { color: var(--accent-warm); text-decoration: underline; text-decoration-color: rgba(235,203,139,0.3); text-underline-offset: 3px; }
    .callout a:hover { text-decoration-color: var(--accent-warm); }
    .code-block {
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px;
      padding: 24px; font-family: var(--font-mono); font-size: 0.82rem;
      line-height: 1.7; color: var(--text-secondary); margin: 20px 0;
      overflow-x: auto; position: relative; backdrop-filter: blur(10px);
    }
    .code-block .kw { color: var(--accent-warm); }
    .code-block .val { color: var(--accent-green); }
    .code-block .cm { color: var(--text-muted); font-style: italic; }
    .code-block .acc { color: var(--accent-gold); }
    code {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      padding: 2px 7px; border-radius: 5px; font-family: var(--font-mono);
      font-size: 0.82em; color: var(--accent-warm);
    }
    .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 24px 0; }
    .feature-card {
      background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px;
      padding: 22px; position: relative; overflow: hidden;
      box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.05);
      transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s, box-shadow 0.3s;
    }
    .feature-card:hover {
      background: var(--bg-card-hover); transform: translateY(-4px);
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
      border-color: rgba(255,255,255,0.1);
    }
    .feature-card .card-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: var(--text-primary); margin-bottom: 14px;
      box-shadow: 0 0 15px var(--accent-glow);
    }
    .feature-card h4 { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .feature-card p { font-size: 0.82rem; color: var(--text-muted); line-height: 1.55; margin: 0; font-weight: 300; }
    .partner-bar {
      display: flex; align-items: center; flex-wrap: wrap; gap: 16px 32px; padding: 20px 0; margin: 20px 0;
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    }
    .partner-bar span { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
    .partner-logos { display: flex; align-items: center; flex-wrap: wrap; gap: 12px 28px; }
    .partner-logo { font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text-muted); opacity: 0.5; transition: opacity 0.2s; white-space: nowrap; }
    .partner-logo:hover { opacity: 0.8; }
    .chain-pills { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .chain-pill {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
      border-radius: 100px; background: rgba(255,255,255,0.03);
      border: 1px solid var(--border); font-size: 12px;
      color: var(--text-secondary); font-weight: 500; transition: all 0.2s;
    }
    .chain-pill:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.05); }
    .chain-pill .cd { width: 6px; height: 6px; border-radius: 50%; }
    .compare-table { width: 100%; border-collapse: collapse; margin: 24px 0; font-size: 0.85rem; }
    .compare-table th { text-align: left; padding: 12px 16px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border); }
    .compare-table td { padding: 14px 16px; color: var(--text-secondary); border-bottom: 1px solid var(--border); font-weight: 300; }
    .compare-table tr:last-child td { border-bottom: none; }
    .compare-table .hl { color: var(--text-primary); font-weight: 500; }
    .security-visual {
      background: linear-gradient(135deg, rgba(235,203,139,0.03), rgba(163,190,140,0.03));
      border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 32px;
      margin: 24px 0; display: flex; align-items: center; gap: 32px;
      box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.05);
    }
    .security-icon-big {
      width: 72px; height: 72px; border-radius: 20px;
      background: rgba(235,203,139,0.06); border: 1px solid rgba(235,203,139,0.1);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      box-shadow: 0 0 20px rgba(235,203,139,0.1);
    }
    .security-icon-big i { font-size: 28px; color: var(--accent-gold); opacity: 0.7; }
    .step-flow { margin: 24px 0; }
    .step-item { display: flex; gap: 16px; position: relative; }
    .step-line { display: flex; flex-direction: column; align-items: center; width: 24px; flex-shrink: 0; }
    .step-dot {
      width: 24px; height: 24px; border-radius: 50%; background: var(--bg-elevated);
      border: 1.5px solid var(--border-hover);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--text-muted); font-weight: 600; flex-shrink: 0; z-index: 1;
    }
    .step-connector { width: 1px; flex: 1; background: var(--border); min-height: 20px; }
    .step-content { padding-bottom: 24px; flex: 1; }
    .step-content h4 { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
    .step-content p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.55; margin: 0; }

    /* ═══ SCENARIO CARD ═══ */
    .scenario-card {
      background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px; padding: 24px; margin: 14px 0;
      position: relative; overflow: hidden;
      box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.05);
    }
    .scenario-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px; background: linear-gradient(to right, var(--accent-warm), transparent); opacity: 0.3;
    }
    .scenario-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--accent-warm); font-weight: 600; margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .scenario-msg {
      font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.6;
      color: var(--text-primary); padding: 14px 18px;
      background: rgba(0,0,0,0.25); border-radius: 10px;
      border: 1px solid var(--border); margin-bottom: 14px;
    }
    .scenario-what { font-size: 0.84rem; color: var(--text-muted); line-height: 1.6; font-weight: 300; }
    .scenario-what strong { color: var(--text-secondary); font-weight: 500; }

    /* ═══ DIGEST PREVIEW ═══ */
    .digest-preview { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; overflow: hidden; margin: 24px 0; box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.05); }
    .digest-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.03); }
    .digest-header h4 { font-family: var(--font-display); font-size: 0.95rem; font-weight: 600; color: var(--text-primary); }
    .digest-header .time-pill { font-family: var(--font-mono); font-size: 9px; font-weight: 700; padding: 4px 10px; border-radius: 6px; background: rgba(235,203,139,0.1); color: var(--accent-warm); text-transform: uppercase; }
    .digest-body { padding: 20px; }
    .digest-section { margin-bottom: 18px; }
    .digest-section:last-child { margin-bottom: 0; }
    .digest-section h5 { font-size: 0.8rem; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
    .digest-section p { font-size: 0.8rem; color: var(--text-muted); line-height: 1.55; margin: 0; }
    .digest-item { display: flex; gap: 10px; margin-bottom: 6px; font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }
    .digest-item .di { color: var(--accent-warm); flex-shrink: 0; margin-top: 2px; font-size: 8px; }

    /* ═══ SIMULATION ═══ */
    .sim-terminal { background: #000; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; overflow: hidden; margin: 28px 0; position: relative; box-shadow: 0 20px 50px -10px rgba(0,0,0,0.5); }
    .sim-terminal::after { content: ''; position: absolute; inset: 0; border-radius: 16px; background: linear-gradient(135deg, rgba(235,203,139,0.02) 0%, transparent 50%); pointer-events: none; }
    .sim-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.03); }
    .sim-header-left { display: flex; align-items: center; gap: 10px; }
    .sim-header-left .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-green); animation: pulse-glow 2s infinite; }
    .sim-header-left span { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-muted); font-weight: 500; }
    .sim-status { font-family: var(--font-mono); font-size: 9px; font-weight: 700; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
    .sim-status.idle { background: rgba(255,255,255,0.04); color: var(--text-muted); }
    .sim-status.running { background: rgba(235,203,139,0.1); color: var(--accent-warm); border: 1px solid rgba(235,203,139,0.2); box-shadow: 0 0 10px rgba(235,203,139,0.1); animation: pulse 1.5s infinite; }
    .sim-status.complete { background: rgba(163,190,140,0.12); color: var(--accent-green); }
    .sim-prompt { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .sim-prompt label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 8px; }
    .sim-prompt-text { font-size: 0.88rem; color: var(--text-primary); font-weight: 400; line-height: 1.5; min-height: 22px; }
    .typing-cursor::after {
      content: ''; display: inline-block; width: 8px; height: 18px;
      background: var(--accent-warm); animation: blink 1s step-end infinite;
      vertical-align: middle; margin-left: 2px;
      box-shadow: 0 0 8px var(--accent-warm);
    }
    @keyframes blink { 50% { opacity: 0; } }
    .sim-logs { padding: 16px 20px 20px; min-height: 180px; max-height: 260px; overflow-y: auto; }
    .sim-logs label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 10px; }
    .sim-log-line { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; font-family: var(--font-mono); font-size: 0.78rem; line-height: 1.5; opacity: 0; animation: logIn 0.4s ease forwards; }
    @keyframes logIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }
    .sim-log-line .log-icon { width: 16px; flex-shrink: 0; text-align: center; margin-top: 1px; }
    .sim-log-line.processing { color: var(--accent-warm); }
    .sim-log-line.processing .log-icon { animation: spin 1.5s linear infinite; }
    .sim-log-line.success { color: var(--accent-green); }
    .sim-log-line.info { color: var(--accent-blue); }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══ PLAY BUTTON ═══ */
    .sim-play-overlay {
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
      cursor: pointer; transition: all 0.2s;
    }
    .sim-play-overlay:hover .play-btn { background: rgba(255,255,255,0.1); transform: scale(1.02); box-shadow: 0 0 20px rgba(255,255,255,0.1); }
    .play-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 24px; border-radius: 100px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      color: #fff; font-family: var(--font-body);
      font-size: 13px; font-weight: 600; transition: all 0.25s ease;
    }
    .play-btn i { font-size: 11px; }

    /* ═══ FAQ ═══ */
    .faq-item {
      border: 1px solid rgba(255,255,255,0.05); border-radius: 12px;
      margin-bottom: 10px; overflow: hidden;
      transition: border-color 0.2s;
      box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.03);
    }
    .faq-item:hover { border-color: var(--border-hover); }
    .faq-item.open { border-color: var(--border-active); }
    .faq-q {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px; cursor: pointer; gap: 16px;
      background: transparent; border: none; width: 100%;
      text-align: left; font-family: var(--font-body);
      font-size: 0.92rem; font-weight: 500; color: var(--text-primary);
      transition: background 0.15s;
    }
    .faq-q:hover { background: rgba(255,255,255,0.02); }
    .faq-q i { color: var(--text-muted); font-size: 10px; transition: transform 0.2s; flex-shrink: 0; }
    .faq-item.open .faq-q i { transform: rotate(180deg); color: var(--accent-warm); }
    .faq-a {
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease;
      padding: 0 22px;
    }
    .faq-item.open .faq-a { max-height: 800px; padding: 0 22px 20px; }
    .faq-a p { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.7; margin-bottom: 10px; font-weight: 300; }
    .faq-a p:last-child { margin-bottom: 0; }
    .faq-a strong { color: var(--text-primary); font-weight: 500; }
    .faq-a .faq-steps {
      background: rgba(0,0,0,0.2); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 20px; margin: 12px 0;
      font-size: 0.84rem; line-height: 1.7; color: var(--text-secondary);
    }
    .faq-a .faq-steps strong { color: var(--accent-warm); }

    /* ═══ THEME TOGGLE ═══ */
    .theme-toggle {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; margin-bottom: 6px;
      background: rgba(255,255,255,0.03); border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--border-hover); }
    .theme-toggle-track {
      width: 34px; height: 18px; border-radius: 100px;
      background: var(--bg-elevated); border: 1px solid var(--border-hover);
      position: relative; transition: all 0.25s; flex-shrink: 0;
    }
    .theme-toggle-thumb {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent-warm);
      position: absolute; top: 2px; left: 2px;
      transition: transform 0.25s ease;
    }
    body.light .theme-toggle-thumb { transform: translateX(16px); }
    .theme-toggle span {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-muted); font-weight: 500;
    }

    /* ═══ ANIMATIONS ═══ */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeUp 0.5s ease forwards; }
    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.3s; opacity: 0; }
    .delay-4 { animation-delay: 0.4s; opacity: 0; }

    /* ═══ MOBILE NAV ═══ */
    .mobile-hamburger {
      display: none; position: fixed; top: 16px; left: 16px; z-index: 100;
      width: 42px; height: 42px; border-radius: 12px;
      background: rgba(20,20,20,0.8); backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer; align-items: center; justify-content: center;
      color: var(--text-primary); font-size: 16px;
      transition: all 0.2s;
    }
    .mobile-hamburger:hover { background: rgba(40,40,40,0.9); }
    .mobile-overlay {
      display: none; position: fixed; inset: 0; z-index: 9;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      opacity: 0; transition: opacity 0.3s;
    }
    .mobile-overlay.open { opacity: 1; }

    /* ═══ LEGAL PAGES (sidebar hidden, full-width) ═══ */
    body.legal-route .sidebar,
    body.legal-route .mobile-hamburger,
    .sidebar.legal-hidden { display: none !important; }
    .sidebar.legal-hidden ~ .mobile-hamburger { display: none !important; }
    .content-area.legal-full { margin: 0 auto; max-width: 780px; }

    @media (max-width: 900px) {
      .sidebar {
        display: flex; position: fixed; left: -280px;
        top: 0; bottom: 0; width: 270px;
        z-index: 50; transition: left 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: none;
      }
      .sidebar.open { left: 0; box-shadow: 20px 0 60px rgba(0,0,0,0.5); }
      .mobile-hamburger { display: flex; }
      .mobile-overlay { display: block; pointer-events: none; }
      .mobile-overlay.open { pointer-events: auto; }
      .content-area { padding: 64px 20px 80px; }
      .doc h1 { font-size: 2.4rem; }
      .feature-grid { grid-template-columns: 1fr; }
      .security-visual { flex-direction: column; text-align: center; }
    }
  </style>

      <p>You can export your private key at any time using the <strong><i class="fa-solid fa-key" style="color:var(--accent-warm); font-size:11px;"></i> key icon</strong> next to your wallet address in the wallet panel. Once exported, you can import it into any external wallet like MetaMask or Phantom and access your funds completely independently of Fere.</p>
      <p>Fere cannot seize, freeze, move, or view your private key. This is enforced by architecture, not just policy.</p>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">How do I export my private key to MetaMask?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p>Use this to move your <strong>EVM wallet</strong> (Base, Ethereum, Polygon, Arbitrum, etc.) to MetaMask:</p>
      <div class="faq-steps">
        <strong>Step 1:</strong> In Fere, find your EVM wallet address in the right panel (starts with 0x). Click the <i class="fa-solid fa-key" style="color:var(--accent-warm); font-size:11px;"></i> key icon next to it to reveal your private key. Copy it.<br><br>
        <strong>Step 2:</strong> Open MetaMask (browser extension or mobile app).<br><br>
        <strong>Step 3:</strong> Click the account selector (circle icon at the top).<br><br>
        <strong>Step 4:</strong> Select <strong>"Add account or hardware wallet"</strong>, then choose <strong>"Import account"</strong>.<br><br>
        <strong>Step 5:</strong> Make sure "Private Key" is selected as the type. Paste your key and click <strong>Import</strong>.<br><br>
        Your Fere wallet will now appear in MetaMask with an "Imported" label. You can use both Fere and MetaMask to access the same funds.
      </div>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">How do I export my private key to Phantom?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p>Use this to move your <strong>Solana wallet</strong> to Phantom:</p>
      <div class="faq-steps">
        <strong>Step 1:</strong> In Fere, find your Solana wallet address in the right panel (starts with a non-0x string). Click the <i class="fa-solid fa-key" style="color:var(--accent-warm); font-size:11px;"></i> key icon to reveal your Solana private key. Copy it.<br><br>
        <strong>Step 2:</strong> Open Phantom (browser extension or mobile app).<br><br>
        <strong>Step 3:</strong> Click your profile avatar in the upper-left corner.<br><br>
        <strong>Step 4:</strong> Click <strong>"Add / Connect Wallet"</strong> (or the pencil icon on mobile), then select <strong>"Import Private Key"</strong>.<br><br>
        <strong>Step 5:</strong> Enter a name for the account, select <strong>Solana</strong> as the network, paste your private key, and click <strong>Import</strong>.<br><br>
        Your Fere Solana wallet will now appear in Phantom. You can use both apps to access the same funds.
      </div>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">What is "Hide dust" in the wallet?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p>The <strong>"Hide dust (&lt;$0.05)"</strong> checkbox in your wallet panel hides tokens with very small balances — typically leftover fragments from trades. This keeps your asset list clean and focused on your meaningful holdings. Uncheck it to see everything.</p>
    </div>
  </div>

  <h2>Trading</h2>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">What happens if a trade fails?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p>Fere has <strong>intelligent retries and fallback routing</strong> built in — so most failures that would stop a normal wallet are handled automatically. If a route fails due to slippage or liquidity, Fere retries with an alternative path before giving up. If it truly can't execute (e.g., a chain is down), it tells you exactly why and suggests what to do next. No funds leave your wallet on a failed transaction — everything is reverted on-chain.</p>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">What is TP/SL and how does it work?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p><strong>TP (Take-Profit)</strong> automatically sells your token when it rises to a price you set — locking in gains. <strong>SL (Stop-Loss)</strong> automatically sells when it drops to a price you set — limiting losses.</p>
      <p>What makes Fere special is that you can set TP/SL on <strong>any token</strong>, including obscure memecoins and microcaps that other platforms can't support. Just tell Fere: <em>"Set TP at +50% and SL at -20% on my BRETT position"</em> and it's done. Active TP/SL orders appear right under the token in your wallet panel.</p>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">How do limit orders work on Fere?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p>Limit orders let you set a price at which you want to buy or sell a token. Once the market reaches your target price, Fere executes the trade automatically. You can view all your active limit orders in the <strong>Limit Orders</strong> tab of your wallet panel.</p>
      <p>Unlike centralized exchanges, Fere can place limit orders on any DEX token — even ones that aren't listed anywhere else.</p>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">Does Fere trade automatically?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p><strong>Yes.</strong> When you ask Fere to execute a trade, it automatically finds the best route with the lowest slippage and executes. Unlike manual wallet-based trading, Fere has <strong>built-in retries and fallbacks</strong> — if a route fails (common during high-traffic periods or token hype), the agent automatically retries with an alternative route instead of just showing you an error.</p>
      <p>This is a major advantage over traditional wallets, where failed transactions during peak demand simply fail and you have to start over. Fere handles the retry logic intelligently so you don't miss opportunities.</p>
      <p><strong>One caveat:</strong> Fere can't fix chain-level performance issues. If a blockchain itself is congested or down, retries won't help — but Fere will tell you exactly what's happening.</p>
      <p>For <strong>scheduled strategies</strong>, the agent executes autonomously based on the conditions you set — that's the whole point of automation. You can pause or stop any schedule at any time from the Schedules tab.</p>
    </div>
  </div>

  <h2>Schedules & Recipes</h2>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">Can I stop a schedule once it's running?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p><strong>Yes, absolutely.</strong> Go to the <strong>Schedules</strong> tab in the left sidebar, find the schedule you want to stop, and pause or cancel it. It stops immediately — no lock-in, no waiting for the next cycle to complete. You can also restart it later if you change your mind.</p>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">What's the difference between a recipe and a schedule?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p>A <strong>recipe</strong> is a pre-built, one-click workflow — think of it as a template that runs once. You configure it, hit run, and get results.</p>
      <p>A <strong>schedule</strong> is any instruction (including custom ones you write yourself) set to run repeatedly on a timer — every hour, every day, etc. Schedules are more powerful because they're autonomous and ongoing, and the agent thinks fresh each cycle.</p>
    </div>
  </div>

  <h2>Credits & Rewards</h2>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">How much does it cost to use Fere?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p>Each AI agent conversation costs <strong>15 credits</strong>. A scheduled Market Pulse execution costs <strong>70 credits</strong>. You get 200 credits free at signup (valid for 14 days). Credit packs start at <strong>$5 for 300 credits</strong>, so a single agent query costs about $0.25. Larger packs give you more credits per dollar.</p>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">How do I get free credits?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p>Two ways: <strong>(1)</strong> You get 200 credits free when you sign up — valid for 14 days. <strong>(2)</strong> Refer friends using your referral code — you earn credits when they start using Fere (subject to a spending threshold and lifetime cap).</p>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">Do credits expire?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p><strong>Signup credits</strong> expire 14 days after you create your account. <strong>Purchased credits</strong> (from credit packs) <strong>never expire</strong> — they stay in your account until you use them.</p>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">How do points differ from credits?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p><strong>Credits</strong> are the currency you spend to use Fere's features — they're consumed when the agent runs queries or scheduled tasks. <strong>Points</strong> are a reward metric that tracks your activity level. You earn points passively by using the platform, and they determine your position on the weekly leaderboard. Points refresh every Monday. Purchased credits never expire; signup credits expire after 14 days.</p>
    </div>
  </div>

  <h2>General</h2>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">What are the trending topic pills below the search bar?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p>Those are <strong>AI-generated suggestions</strong> based on what's happening in crypto right now — things like "Liquidation & Fear Correlation" or "Dormant Whale BTC Buys". Click any one to start a conversation about that topic. They're updated regularly to reflect the current market narrative.</p>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">Which chains does Fere support?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p>Fere currently supports <strong>8 chains</strong>: Ethereum, Base, Solana, Berachain, Monad, Optimism, Polygon, and Arbitrum. You can see all supported chains at the bottom of your wallet panel. New chains are added regularly.</p>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">How do I add funds to my wallet?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p>Click the <strong>"Add Funds"</strong> button at the top of your wallet panel. You can deposit crypto directly to your Fere wallet addresses — send EVM tokens to your 0x address or SOL to your Solana address. Both addresses are visible in the wallet panel and can be copied with one click.</p>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">Is my trading data private?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p><strong>Yes.</strong> Your strategies, chat history, and trading activity are encrypted at rest and never shared with third parties. Fere does not use your data to train AI models unless you explicitly opt in via the Rewards Program. Your alpha stays private.</p>
    </div>
  </div>

  <div class="faq-item" onclick="toggleFaq(this)">
    <button class="faq-q">Can I see my past conversations?<i class="fa-solid fa-chevron-down"></i></button>
    <div class="faq-a">
      <p>Yes. All your past conversations are saved and listed in the left sidebar under <strong>Chats</strong>. Click any conversation to reopen it and continue where you left off. This makes it easy to reference previous trades, strategies, or analysis.</p>
    </div>
  </div>
`

    function playSim(id) {
      const config = simConfigs[id];
      if (!config) return;

      // Hide play button, show sim areas
      const playEl = document.getElementById(`${id}-play`);
      const promptEl = document.getElementById(`${id}-sim-prompt`);
      const logsEl = document.getElementById(`${id}-sim-logs`);
      const statusEl = document.getElementById(`${id}-sim-status`);
      const typingEl = document.getElementById(`${id}-sim-typing`);
      const cursorEl = document.getElementById(`${id}-cursor`);

      if (playEl) playEl.style.display = 'none';
      if (promptEl) promptEl.style.display = 'block';
      if (logsEl) { logsEl.style.display = 'block'; logsEl.innerHTML = '<label>Agent Execution Log</label>'; }
      if (typingEl) typingEl.textContent = '';
      if (cursorEl) cursorEl.style.display = '';
      if (statusEl) { statusEl.textContent = 'Idle'; statusEl.className = 'sim-status idle'; }

      let i = 0;
      function typeChar() {
        if (i < config.text.length) {
          typingEl.textContent += config.text[i]; i++;
          simTimeouts.push(setTimeout(typeChar, 25));
        } else {
          if (cursorEl) cursorEl.style.display = 'none';
          statusEl.textContent = 'Executing';
          statusEl.className = 'sim-status running';
          simTimeouts.push(setTimeout(() => runSteps(id, 0), 600));
        }
      }
      simTimeouts.push(setTimeout(typeChar, 400));
    }

    function runSteps(id, index) {
      const config = simConfigs[id];
      const logsEl = document.getElementById(`${id}-sim-logs`);
      const statusEl = document.getElementById(`${id}-sim-status`);
      if (index >= config.steps.length) {
        statusEl.textContent = 'Complete';
        statusEl.className = 'sim-status complete';
        return;
      }
      const step = config.steps[index];
      const div = document.createElement('div');
      div.className = `sim-log-line ${step.type}`;
      const icons = { processing: '⟳', success: '✓', info: '•' };
      div.innerHTML = `<span class="log-icon">${icons[step.type] || '•'}</span><span>${step.text}</span>`;
      logsEl.appendChild(div);
      logsEl.scrollTop = logsEl.scrollHeight;
      const delay = step.type === 'processing' ? 1000 : step.type === 'success' ? 600 : 500;
      simTimeouts.push(setTimeout(() => runSteps(id, index + 1), delay));
    }

    /* ═══ MOBILE NAV ═══ */
    function toggleMobileNav() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.querySelector('.mobile-overlay');
      const icon = document.getElementById('mobile-icon');
      const isOpen = sidebar.classList.toggle('open');
      overlay.classList.toggle('open', isOpen);
      icon.className = isOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-bars';
    }

    /* ═══ THEME TOGGLE ═══ */
    function toggleTheme() {
      document.body.classList.toggle('light');
      const isLight = document.body.classList.contains('light');
      document.getElementById('theme-label').textContent = isLight ? 'Dark Mode' : 'Light Mode';
      try { localStorage.setItem('fere-theme', isLight ? 'light' : 'dark'); } catch(e) {}
    }
    (function() {
      try {
        if (localStorage.getItem('fere-theme') === 'light') {
          document.body.classList.add('light');
          setTimeout(() => { document.getElementById('theme-label').textContent = 'Dark Mode'; }, 0);
        }
      } catch(e) {}
    })();

    function getPageFromHash() {
      const h = location.hash.replace('#', '');
      return pages[h] ? h : 'overview';
    }
    window.addEventListener('load', () => showPage(getPageFromHash()));
    window.addEventListener('hashchange', () => showPage(getPageFromHash()));
